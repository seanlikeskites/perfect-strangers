site_name: perfect-strangers
repo_url: https://github.com/seanlikeskites/perfect-strangers
copyright: "Copyright &copy; 2026 Sean Enderby"

watch:
  - "docs/scripts/main.py"
  - "src"

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Usage:
    - usage/quick_start.md
    - usage/matcher_objects.md
    - usage/license.md
#  - Theory:
#    - theory/overview.md
#    - theory/kirkman.md


theme:
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    scheme: default

markdown_extensions:
  - attr_list
  - zensical.extensions.macros:
      module_name: "docs/scripts/main"
      on_error_fail: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_source: false
