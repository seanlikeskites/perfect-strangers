name: Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - name: Install Latex
        run: sudo apt-get install -y texlive-latex-extra poppler-utils
      - name: Make Diagrams
        working-directory: ./docs/diagrams
        run: sh make_diagrams.sh
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install Zensical
        run: pip install zensical mkdocstrings-python .
      - name: Zensical Build
        run: zensical build --clean 
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
